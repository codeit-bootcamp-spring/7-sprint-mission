spring:
  application:
    name: discordit
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Seoul
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

validation:
  user:
    id:
      min-length: 4
      max-length: 10
    password:
      min-length: 6
      max-length: 12
    display-name:
      min-length: 3
      max-length: 10
    email-regex: "^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$"
user-status:
  online-threshold-minutes: 5
logging:
  level:
    root: info
  logback:
    rollingpolicy:

