name: CD - Deploy to ECS

on:
  push:
    branches:
      - release

# 과제 요구사항: GitHub Variables 사용
env:
  AWS_REGION: ${{ vars.AWS_REGION }}                     # ap-northeast-2
  ECR_REPOSITORY_URI: ${{ vars.ECR_REPOSITORY_URI }}     # public.ecr.aws/xxxx/repo
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}                   # discodeit-cluster
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}                   # discodeit-service
  ECS_TASK_DEFINITION: ${{ vars.ECS_TASK_DEFINITION }}   # discodeit-task
  CONTAINER_NAME: discodeit-app

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-22.04

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # workflow가 실행될 때마다 매번 라이브러리를 새로 받으면 오래걸리겠죠?
      # 저번에 썼던 게 있다면 그걸 그대로 써서 시간을 절약합니다.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # 이 한 줄로 Gradle 캐싱이 활성화됩니다.

      # 2. AWS 인증 (Public ECR 전용, us-east-1)
      - name: Configure AWS credentials (Public ECR)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      # 3. Public ECR 로그인
      - name: Login to Public ECR
        run: |
          aws ecr-public get-login-password \
            | docker login \
              --username AWS \
              --password-stdin public.ecr.aws

      # 4. Docker 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        id: build-image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REPOSITORY_URI:$IMAGE_TAG \
            -t $ECR_REPOSITORY_URI:latest .

          docker push $ECR_REPOSITORY_URI:$IMAGE_TAG
          docker push $ECR_REPOSITORY_URI:latest

          echo "image=$ECR_REPOSITORY_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 5. AWS 인증 (ECS 클러스터 리전)
      - name: Configure AWS credentials (ECS)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # 6. 기존 Task Definition 다운로드 및 정리
      - name: Download and Clean Task Definition
        run: |
          sudo apt-get update && sudo apt-get install -y jq

          aws ecs describe-task-definition \
            --task-definition $ECS_TASK_DEFINITION \
            --query taskDefinition > task-definition.json

          jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy,
            .enableFaultInjection
          )' task-definition.json > clean-task-definition.json

          mv clean-task-definition.json task-definition.json

      # 7. 새 이미지로 Task Definition 렌더링
      - name: Render New Task Definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      # 8. 프리티어 고려: 기존 서비스 중단
      - name: Stop ECS Service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --desired-count 0

      # 9. 새 Task Definition으로 서비스 업데이트
      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      # 10. 서비스 재기동
      - name: Start ECS Service
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --desired-count 1

      # 배포 완료 메시지
      - name: Deploy result
        run: |
          echo "Deployment completed successfully!"
          echo "Image: ${{ steps.build-image.outputs.image }}"
          echo "Service: ${{ env.ECS_SERVICE }}"
          echo "Cluster: ${{ env.ECS_CLUSTER }}"
