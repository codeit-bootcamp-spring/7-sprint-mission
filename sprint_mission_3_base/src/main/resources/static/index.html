<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Discodeit</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            background: #2b2d31;
            color: #fff;
            font-family: "Segoe UI", sans-serif;
        }

        /* -----------------------------
           좌측 채널 리스트
        ----------------------------- */
        .sidebar {
            width: 260px;
            background: #1e1f22;
            padding: 20px;
            border-right: 1px solid #3a3b3d;
            box-sizing: border-box;
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 15px;
        }

        .channel-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #2f3136;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .channel-item:hover {
            background: #40444b;
        }

        .channel-item.active {
            background: #5865f2;
        }

        /* -----------------------------
           중앙 메시지 화면
        ----------------------------- */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #313338;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: scroll;
        }

        .message-item {
            margin-bottom: 14px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        /* 사용자 아이콘 */
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* 말풍선 */
        .bubble {
            background: #3a3c41;
            padding: 10px 14px;
            border-radius: 10px;
            max-width: 60%;
            line-height: 1.4;
            font-size: 15px;
        }

        /* 이미지 메시지 */
        .bubble img {
            max-width: 240px;
            border-radius: 10px;
            margin-top: 8px;
        }

        /* -----------------------------
           메시지 입력창
        ----------------------------- */
        .input-area {
            padding: 14px;
            display: flex;
            gap: 10px;
            background: #1e1f22;
            border-top: 1px solid #3a3b3d;
        }

        .input-area input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        .input-area button {
            padding: 12px 20px;
            border: none;
            background: #5865f2;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .input-area button:hover {
            background: #4752c4;
        }

        /* -----------------------------
           오른쪽 사용자 리스트
        ----------------------------- */
        .user-panel {
            width: 260px;
            background: #1e1f22;
            border-left: 1px solid #3a3b3d;
            padding: 20px;
            box-sizing: border-box;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: #2f3136;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .user-item img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            margin-right: 10px;
        }

    </style>
</head>

<body>

<!-- 좌측 채널 -->
<div class="sidebar">
    <h2>Channels</h2>
    <div class="channel-list"></div>
</div>

<!-- 중앙 메시지 -->
<div class="chat-area">
    <div class="messages"></div>

    <div class="input-area">
        <input type="text" id="message-input" placeholder="Type a message...">
        <input type="file" id="file-input" accept="image/*">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<!-- 우측 유저 -->
<div class="user-panel">
    <h2>Users</h2>
    <div id="user-info"></div>
</div>

<script>
    const API_BASE = "http://localhost:8080/api";
    const FIXED_USER_ID = "00000000-0000-0000-0000-000000000001";

    let currentChannelId = null;

    /* 초기 로딩 */
    window.addEventListener("DOMContentLoaded", () => {
        loadChannels();
        loadUsers();
    });

    /* ============================================
       1) 채널 목록 불러오기
    ============================================ */
    async function loadChannels() {
        const res = await fetch(`${API_BASE}/channels`);
        const channels = await res.json();

        const channelList = document.querySelector(".channel-list");
        channelList.innerHTML = "";

        channels.forEach(ch => {
            const div = document.createElement("div");
            div.classList.add("channel-item");
            div.textContent = ch.name;

            div.addEventListener("click", () => {
                document.querySelectorAll(".channel-item").forEach(i => i.classList.remove("active"));
                div.classList.add("active");
                selectChannel(ch.id);
            });

            channelList.appendChild(div);
        });
    }

    /* ============================================
       2) 채널 선택 → 메시지 불러오기
    ============================================ */
    async function selectChannel(channelId) {
        currentChannelId = channelId;
        loadMessages(channelId);
    }

    async function loadMessages(channelId) {
        const res = await fetch(`${API_BASE}/messages/channel/${channelId}?page=0&size=50`);
        const page = await res.json();

        const msgArea = document.querySelector(".messages");
        msgArea.innerHTML = "";

        page.content.forEach(msg => {
            const wrapper = document.createElement("div");
            wrapper.classList.add("message-item");

            const avatar = document.createElement("div");
            avatar.classList.add("avatar");
            avatar.textContent = "U";

            const bubble = document.createElement("div");
            bubble.classList.add("bubble");

            /* 텍스트 메시지 */
            if (msg.content) {
                const text = document.createElement("div");
                text.textContent = msg.content;
                bubble.appendChild(text);
            }

            /* 이미지 메시지 */
            if (msg.binaryContentId) {
                const img = document.createElement("img");
                img.src = `${API_BASE}/binaryContents/${msg.binaryContentId}/download`;
                bubble.appendChild(img);
            }

            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            msgArea.appendChild(wrapper);
        });

        msgArea.scrollTop = msgArea.scrollHeight;
    }

    /* ============================================
       3) 메시지 전송 (이미지 포함 multipart)
    ============================================ */
    async function sendMessage() {
        if (!currentChannelId) return;

        const input = document.getElementById("message-input");
        const fileInput = document.getElementById("file-input");

        const content = input.value.trim();
        const file = fileInput.files[0];

        const form = new FormData();
        form.append("json", new Blob([JSON.stringify({
            channelId: currentChannelId,
            authorId: FIXED_USER_ID,
            content: content
        })], { type: "application/json" }));

        if (file) form.append("file", file);

        await fetch(`${API_BASE}/messages`, {
            method: "POST",
            body: form
        });

        input.value = "";
        fileInput.value = "";

        loadMessages(currentChannelId);
    }

    /* ============================================
       4) 사용자 목록
    ============================================ */
    async function loadUsers() {
        const res = await fetch(`${API_BASE}/users`);
        const users = await res.json();

        const panel = document.getElementById("user-info");
        panel.innerHTML = "";

        users.forEach(u => {
            const div = document.createElement("div");
            div.classList.add("user-item");

            const img = document.createElement("img");
            img.src = u.profileId
                ? `${API_BASE}/binaryContents/${u.profileId}/download`
                : "https://via.placeholder.com/40";

            div.appendChild(img);
            div.innerHTML += `<span>${u.username}</span>`;

            panel.appendChild(div);
        });
    }

</script>

</body>
</html>
