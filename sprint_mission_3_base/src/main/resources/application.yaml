spring:
  profiles:
    active: default   # local 프로필 필요 없음

  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none      # DB에 이미 테이블 있음 → Hibernate는 생성/수정 X
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  mvc:
    dispatch-options-request: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

  sql:
    init:
      mode: never        # ⭐ schema.sql 절대 실행 금지 (충돌 완전 제거)

discodeit:
  storage:
    type: local
    local:
      root-path: ./discodeit-storage

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql: trace

springdoc:
  api-docs:
    resolve-schema-properties: true

  override-with-generic-response: false

  swagger-ui:
    disable-swagger-default-url: true
    display-request-duration: true
    operations-sorter: alpha
    tags-sorter: alpha
