spring:
  application:
    name: discodeit

  profiles:
    default: dev

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

  jpa:
    open-in-view: false

logging:
  level:
    root: INFO

discodeit:
  storage:
    type: ${STORAGE_TYPE:local}

    local:
      root-path: ${STORAGE_LOCAL_ROOT_PATH:.discodeit/storage}

    s3:
      access-key: ${AWS_S3_ACCESS_KEY:}
      secret-key: ${AWS_S3_SECRET_KEY:}
      region: ${AWS_S3_REGION:ap-northeast-2}
      bucket: ${AWS_S3_BUCKET:}
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:600}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers

  endpoint:
    info:
      enabled: true

  info:
    defaults:
      enabled: true
    env:
      enabled: true

info:
  app:
    name: Discodeit
    version: 1.7.0
    java-version: 17
    spring-boot-version: 3.4.0
  datasource:
    url: ${spring.datasource.url:}
    driver-class-name: ${spring.datasource.driver-class-name:}
  jpa:
    ddl-auto: ${spring.jpa.hibernate.ddl-auto:}
  storage:
    type: ${discodeit.storage.type}
    path: ${discodeit.storage.local.root-path}
  multipart:
    max-file-size: ${spring.servlet.multipart.max-file-size}
    max-request-size: ${spring.servlet.multipart.max-request-size}

