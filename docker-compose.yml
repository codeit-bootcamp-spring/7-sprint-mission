version: '3.8'

services:
  discodeit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discodeit
    ports:
      - "8081:8080"
    volumes:
      - discodeit-storage:/app/storage
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      DISCODEIT_STORAGE: /app/storage
#      JAVA_OPTS: -Xms200m -Xmx400m
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: discodeit-postgres
    ports:
      - "5432:5432"
    volumes:
      - discodeit-postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  discodeit-storage:
    driver: local
  discodeit-postgres-data: