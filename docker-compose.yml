version: '3.8' # Docker Compose 파일 형식의 버전. 대부분 3.8을 많이 사용

services: # 실행할 여러 컨테이너들을 정의
  app:
    build: # 이미지를 직접 만들 때 사용
      context: . # 현재 경로에서 빌드할거야
      dockerfile: Dockerfile # 어떤 도커파일을 쓸지 명시
    image: discodeit:dev
    container_name: discodeit-app
    depends_on: # 서비스 시작 순서 제어
      postgres:
        condition: service_healthy # postgres가 health check를 통과할 때까지 대기
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SERVER_PORT=${APP_SERVER_PORT}
      - JVM_OPTS=${JVM_OPTS}
      - PROJECT_NAME=${PROJECT_NAME}
      - PROJECT_VERSION=${PROJECT_VERSION}
#      - DISCODEIT_STORAGE_LOCAL_ROOT_PATH=${BINARY_CONTENT_STORAGE_PATH}
      - STORAGE_TYPE=s3
    #    healthcheck:
    #      test: ["CMD", "curl", "-f", "http://app:8080/actuator/health"]
    ports:
      - "${APP_HOST_PORT}:${APP_SERVER_PORT}"

    volumes:
      - binary_content_storage:${BINARY_CONTENT_STORAGE_PATH}

    env_file:
      - .env

  postgres:
    image: postgres:16
    container_name: discodeit-postgres
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB} # compose 파일을 외부에 노출해야 한다면 하드코딩은 값이 노출될 수 있으, .env파일에서 끌어오자.
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
#    command: >
#      postgres
#      -c shared_buffers=128MB
#      -c max_connections=50
    healthcheck: # 컨테이너가 정상인지 주기적으로 확인
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"] # 헬스 체크를 위해 실행할 명령어
      interval: 5s # 10초마다 체크
      timeout: 3s # 5초 안에 응답 없으면 unhealthy
      retries: 20 # 5번 실패하면 unhealthy 상태로 판정

volumes:
  binary_content_storage:
  postgres_data:


