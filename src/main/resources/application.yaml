spring:
  application:
    name:  discodeit
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

discodeit:
  storage:
    type: local
    local:
      root-path: . discodeit/storage

springdoc:
  swagger-ui:
    path: /api-docs.html
    display-request-duration: true
    enabled:  true
  api-docs:
    path: /api-docs

logging:
  level:
    root: INFO