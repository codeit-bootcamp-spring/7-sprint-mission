spring:
  application:
    name : discodeit
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver
  jpa:
    database: postgresql
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
discodeit:
  repository:
    type: file
    file-directory: .discodeit
  storage:
    local:
      root-path: "${user.home}/Documents/discodeit/jpaData"
server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /api-docs.html
    display-request-duration: true
    enabled: true
  api-docs:
    path: /api-docs

