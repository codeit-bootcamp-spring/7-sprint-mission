spring:
  application:
    name: discodeit

  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver

  jpa:
    database: postgresql
    hibernate:
      # DDL 자동 생성 옵션
      # none: 아무것도 하지 않음 (운영 환경)
      # create: 기존 테이블 삭제 후 새로 생성
      # create-drop: 종료 시 테이블 삭제
      # update: 변경된 스키마만 반영 (개발 환경)
      # validate: 엔티티와 테이블이 정상 매핑되었는지만 확인
      ddl-auto: validate

    properties:
      hibernate:
        show_sql: true  # SQL 실행 콘솔 출력
        format_sql: true # 출력을 보기 좋게 바꿔줌

  logging:
    level:
      org:
        hibernate:
          orm:
            jdbc:
              bind: TRACE # 쿼리 로그 ?값을 보여줌

  servlet:
    multipart:
      max-file-size: 500MB    # 기본은 1MB
      max-request-size: 500MB


server:
  port: 8080
# application.yaml
discodeit:
  repository:
    type: file   # jcf | file
    file-directory: /Users/apple/Desktop/codeit-7th-develop/DiscodeitUpload

springdoc:
  swagger-ui:
    path: /api-doc-ui.html  # UI page 경로
    tags-sorter: alpha # 태그 정렬 방식(알파벳순)
    operations-sorter: method # 메서드 정렬 방식 (GET -> POST -> PUT -> DELETE 순)
    display-request-duration: true # 요청에 소요된 시간 표시
    doc-expansion: none # 문서 펼침 상태 (none, list, full)

  api-docs:
    path: /my-api # Swagger가 우리 api의 정보를 얻어오기 위해 요청하는 url

