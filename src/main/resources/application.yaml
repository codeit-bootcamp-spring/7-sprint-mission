discodeit:
  storage:
    type: local       # local일 때만 Bean 등록됨
    local:
      root-path: .discodeit/storage/data
  logging:
    controller:
      enabled: false # AOP 로깅 ON/OFF

file:
  path:
    storage: src/main/resources/Users.ser

spring:
  application:
    name: discodeit
  servlet:
    multipart:
      maxFileSize: 10MB
      maxRequestSize: 30MB
  profiles:
    active: dev



  jpa:
    database: postgresql
    hibernate:
      ddl-auto: update
    properties:
      hibernate:

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
  # 서버 정보 지정
  servers:
    - url: http://localhost:8080
      description: 로컬 서버

logging:
  level:
    root: info





