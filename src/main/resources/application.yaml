server:
  port: 80

spring:
  application:
    name: discodeit
  profiles:
    active: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

cloud:
  aws:
    credentials:
      access-key: ${AWS_S3_ACCESS_KEY}
      secret-key: ${AWS_S3_SECRET_KEY}
    region:
      static: ${AWS_S3_REGION}
    s3:
      bucket: ${AWS_S3_BUCKET}

discodeit:
  storage:
    type: ${STORAGE_TYPE}
    local:
      root-path: "${user.home}/Desktop/DiscodeitUpload"


springdoc:
  swagger-ui:
    path: /api-doc-ui.html  # UI page 경로
    tags-sorter: alpha # 태그 정렬 방식(알파벳순)
    operations-sorter: method # 메서드 정렬 방식 (GET -> POST -> PUT -> DELETE 순)
    display-request-duration: true # 요청에 소요된 시간 표시
    doc-expansion: none # 문서 펼침 상태 (none, list, full)

  api-docs:
    path: /my-api # Swagger가 우리 api의 정보를 얻어오기 위해 요청하는 url

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers #, evn # 꼭 필요한 것만 노출!
      base-path: /management # 경로도 바꿔서 숨

  endpoint:
    health:
      show-details: always # 개발 환경에서는 always, 운영에서는 when-authorized
  info:
    env:
      enabled: true

  server:
    port: 9020 # Actuator 전용 포트 (방화벽으로 막음)

info:
  app:
    name: Discodeit
    java-version: ${java.version}
    java-spring-boot-version: 3.4.10
    encoding: UTF-8

  configs:
    datasource:
      url: ${spring.datasource.url}
      driver-class-name: ${spring.datasource.driver-class-name}

    jpa:
      ddl-auto: ${spring.jpa.hibernate.ddl-auto}

    storage:
      type: ${discodeit.storage.type}
      path: ${discodeit.storage.local.root-path}

    multipart:
      max-file-size: ${spring.servlet.multipart.max-file-size}
      max-request-size: ${spring.servlet.multipart.max-request-size}