discodeit:
  storage:
    type: local       # local일 때만 Bean 등록됨
    local:
      root-path: .discodeit/storage/data

file:
  path:
    storage: src/main/resources/Users.ser

spring:
  application:
    name: discodeit
  servlet:
    multipart:
      maxFileSize: 10MB
      maxRequestSize: 30MB

  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver

  jpa:
    database: postgresql
    hibernate:
      ddl-auto: create
    properties:
      hibernate:

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
  # 서버 정보 지정
  servers:
    - url: http://localhost:8080
      description: 로컬 서버





