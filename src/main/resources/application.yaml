discodeit:
  repository:
    type: file   # jcf | file
    file-directory: .discodeit

file:
  path:
    userPath: src/main/resources/Users.ser
    messagePath: src/main/resources/Messages.ser
    channelPath: src/main/resources/Channels.ser
    userStatusPath: src/main/resources/UserStatuses.ser
    binaryContentPath: src/main/resources/BinaryContent.ser
    readStatusPath: src/main/resources/ReadStatus.ser

spring:
  application:
    name: discodeit
  servlet:
    multipart:
      maxFileSize: 10MB
      maxRequestSize: 30MB

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
  # 서버 정보 지정
  servers:
    - url: http://localhost:8080
      description: 로컬 서버


