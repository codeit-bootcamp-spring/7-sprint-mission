discodeit:
  storage:
    type: local
    local:
      root-path: .discodeit/storage

spring:
  application:
    name: discodeit
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
  profiles:
    active: dev
  jpa:
    database: postgresql
    hibernate:
      ddl-auto: update
    properties:
      hibernate:

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    root: info

#Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers
  info:
    env:
      enabled: true # true로 해주지 않으면, info 값은 보이지 않는다.

info:
  app:
    name: Discodeit
    version: 1.7.0
    java:
      version: 17
    springBoot:
      version: 3.5.6

  config:
    datasource:
      url: ${spring.datasource.url}
      driver-class-name: ${spring.datasource.driver-class-name}
    jpa:
      ddl-auto: ${spring.jpa.hibernate.ddl-auto}
    storage:
      type: ${discodeit.storage.type}
      path: ${discodeit.storage.local.root-path}
    multipart:
      max-file-size: ${spring.servlet.multipart.max-file-size}
      max-request-size: ${spring.servlet.multipart.max-request-size}


