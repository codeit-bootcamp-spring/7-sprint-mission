spring:
  profiles:
    active: dev
  application:
    name: discodeit
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    #jdbc:postgresql://host.docker.internal:5433/postgres 도커 세팅
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver
  jpa:
    database: postgresql
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    open-in-view: false
  servlet:
    multipart:
      enabled: true            # 멀티파트 기능 활성화
      max-file-size: 10MB      # 파일 하나의 최대 크기
      max-request-size: 20MB   # 전체 요청 크기

#Spring Boot Admin
