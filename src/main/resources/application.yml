spring:
  profiles:
    active: dev
  config:
    import: optional:classpath:actuator.yml
  boot:
    admin:
      client:
        instance:
          name: discodeit
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: discodeit-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
logging:
  level:
    root: INFO
    org.springframework.security: trace

admin:
  email: admin@naver.com
  password: admin1234

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJwtTokenGeneration1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ}
  access-token-expiration: 900000      # 60 * 60 * 15
  refresh-token-expiration: 1209600000 # 60 * 60 * 24 * 2
  issuer: jwt-demo-api