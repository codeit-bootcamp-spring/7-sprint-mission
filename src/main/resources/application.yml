server:
  port: 4444

logging:
  level:
    root: info

spring:
  profiles:
    active: dev
  application:
    name: discodeit

# ===============================
# Actuator 설정
# ===============================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: always

# ===============================
# Actuator Info 메타데이터
# ===============================
info:
  app:
    name: discodeit
    version: 1.7.0
  java:
    version: 17
  spring:
    boot:
      version: 3.4.0

  datasource:
    url: ${spring.datasource.url}
    driver-class-name: ${spring.datasource.driver-class-name}

  jpa:
    ddl-auto: ${spring.jpa.hibernate.ddl-auto}

  storage:
    type: ${storage.type}
    path: ${storage.path}

  multipart:
    max-file-size: ${spring.servlet.multipart.max-file-size}
    max-request-size: ${spring.servlet.multipart.max-request-size}


security:
  remember-me:
    key: ${REMEMBER_ME_KEY:test-RememberMeKey}