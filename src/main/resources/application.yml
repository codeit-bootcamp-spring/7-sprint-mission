spring:
  application:
    name: discodeit
  profiles:
    active: test
  #  datasource:
#    url: jdbc:postgresql://localhost:5432/discodeit
#    username: discodeit_user
#    password: discodeit1234
#    driver-class-name: org.postgresql.Driver
  jpa:
    database: postgresql
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    open-in-view: false

discodeit:
  storage:
    type: local
    local:
      root-path: ./binary-storage
logging:
  level:
    root: info

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,env
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true


#discodeit:
#  repository:
#    type: file
#    file-directory: .discodeit
info:
  app:
    name: Discodeit
    version: 1.7.0
    javaVersion: 17
    springBootVersion: 3.4.0

  config:
    datasource:
      url: ${spring.datasource.url:}
      driverClassName: ${spring.datasource.driver-class-name:}
    jpa:
      ddlAuto: ${spring.jpa.hibernate.ddl-auto:}
    storage:
      type: ${discodeit.storage.type:}
      path: ${discodeit.storage.local.root-path:}
    multipart:
      maxFileSize: ${spring.servlet.multipart.max-file-size:}
      maxRequestSize: ${spring.servlet.multipart.max-request-size:}

