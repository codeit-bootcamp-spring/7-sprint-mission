spring:
  application:
    name: discodeit
  servlet:
    multipart:
      enabled: true

server:
  port: 7777

# 심화, 레포지토리 종류로 bin 주입하기.
# 클래스에서 직접 repository 제거.

discodeit:
  repository:
    type: file # jcf | file
    file-directory: data


springdoc:
  swagger-ui:
    path: /api-docs.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
    doc-expansion: list
  api-docs:
    path: /my-api