spring:
  application:
    name: discodeit
  servlet:
    multipart:
      enabled: true
  profiles:
    active: dev

logging:
  level:
    org.hibernate.SQL: info
    org.springframework.web: info

discodeit:
  storage:
    type: local
    local:
      root-path: ./binaryContents


springdoc:
  swagger-ui:
    path: /api-docs.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
    doc-expansion: list
  api-docs:
    path: /my-api