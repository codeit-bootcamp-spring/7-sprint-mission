spring:
  application:
    name: discodeit
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:file:.env[.properties]
  #  datasource:
#    url: jdbc:postgresql://localhost:5432/discodeit
#    username: discodeit_user
#    password: discodeit1234
#    driver-class-name: org.postgresql.Driver
  jpa:
    database: postgresql
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    open-in-view: false

discodeit:
  admin:
    bootstrap:
      enabled: true
      username: admin
      email: admin@discodeit.com
      password: ${DISCODEIT_ADMIN_BOOTSTRAP_PASSWORD:}
  storage:
    type: ${STORAGE_TYPE:local}
    local:
      root-path: ${STORAGE_LOCAL_ROOT_PATH:.discodeit/storage}
    s3:
      access-key: ${AWS_S3_ACCESS_KEY}
      secret-key: ${AWS_S3_SECRET_KEY}
      region: ${AWS_S3_REGION}
      bucket: ${AWS_S3_BUCKET}
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:600}

logging:
  level:
    root: info

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,env
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true


#discodeit:
#  repository:
#    type: file
#    file-directory: .discodeit
info:
  app:
    name: Discodeit
    version: 1.7.0
    javaVersion: 17
    springBootVersion: 3.4.0

  config:
    datasource:
      url: ${spring.datasource.url:}
      driverClassName: ${spring.datasource.driver-class-name:}
    jpa:
      ddlAuto: ${spring.jpa.hibernate.ddl-auto:}
    storage:
      type: ${discodeit.storage.type:}
      path: ${discodeit.storage.local.root-path:}
    multipart:
      maxFileSize: ${spring.servlet.multipart.max-file-size:}
      maxRequestSize: ${spring.servlet.multipart.max-request-size:}

  jwt:
    issuer: discodeit
    secret: ${JWT_SECRET}
    access-token-seconds: 900 # 15분
    refresh-token-seconds: 1209600 # 14일
    refresh-cookie:
      secure: false
      same-site: Lax
      max-age-seconds: 1209600