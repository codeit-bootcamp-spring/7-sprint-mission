spring:
  application:
    name: discodeit
  servlet:
    multipart:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver

  jpa:
    database: postgresql
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        show_sql: true # SQL 확인
        format_sql: true # 읽기 쉽게

logging:
  level:
    org.hibernate.SQL: debug
    org.springframework.web: DEBUG

server:
  port: 7777

discodeit:
  storage:
    type: local
    local:
      root-path: ./binaryContents


springdoc:
  swagger-ui:
    path: /api-docs.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
    doc-expansion: list
  api-docs:
    path: /my-api