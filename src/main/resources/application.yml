spring:
  application:
    name: discodeit
  servlet:
    multipart:
      enabled: true
  profiles:
    active: dev

logging:
  level:
    org.hibernate.SQL: info
    org.springframework.web: info

discodeit:
  storage:
    type: ${STORAGE_TYPE:local} # local | s3 (기본값: local)
    local:
      root-path: ${STORAGE_ROOT_PATH:.discodeit/storage}
    s3:
      access-key: ${AWS_S3_ACCESS_KEY}
      secret-key: ${AWS_S3_SECRET_KEY}
      region: ${AWS_S3_REGION}
      bucket: ${AWS_S3_BUCKET}
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:600} # (기본값: 10분)


springdoc:
  swagger-ui:
    path: /api-docs.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
    doc-expansion: list
  api-docs:
    path: /my-api

info:
  app:
    name: Discodeit
    version: 1.7.0
    encoding: UTF-8
  java:
    version: 17
  spring-boot:
    version: 3.4.0
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    driver-class-name: org.postgresql.Driver
  jpa:
    ddl-auto: create
  storage:
    type: local
    local:
      root-path: ./binaryContents
  multipart:
    max-file-size: 10MB
    max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers
  endpoint:
    health:
      show-details: always

