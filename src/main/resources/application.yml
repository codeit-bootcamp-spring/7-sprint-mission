server:
  port: 8080



discodeit:
  storage:
    type: local
    local:
      root-path: ./data/binary


spring:
  application:
    name: discodeit


  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: postgres
    password: 6091
    driver-class-name: org.postgresql.Driver

  jpa:
    database: POSTGRESQL
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        show_sql: true
        format_sql: true
    open-in-view: true
#default open-in-view: true but silmu false
