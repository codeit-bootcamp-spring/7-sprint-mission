spring:
  application:
    name: discodeit
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
  jpa:
    # //?? 🚨🚨🚨🚨🚨 리팩토링: OSIV가 비활성화되면, 뷰 레이어에서 지연 로딩이 불가능해집니다. 따라서 지연 로딩이 필요한 엔티티를 조회하는 로직을 서비스 계층으로 옮겨야 합니다.
    open-in-view: true # OSIV(Open Session In View) HTTP 요청이 끝날 때 영속성 컨텍스트와 데이터베이스 커넥션이 닫히며, 지연 로딩된 엔티티를 사용하는 로직은 서비스 계층 안에서 모두 처리해야
    database: postgresql
#    show-sql: true # System.out을 통해 SQL 출력. 운영 환경에서는 권장하지 않음
    hibernate: # JPA 인터페이스를 구현
       ddl-auto: create  #update # 변경된 스키마 적용. 컬럼 추가만 반영. 삭제x
      # format_sql: true # SQL을 보기 좋게 포맷팅 (들여쓰기 등)
        # use_sql_comments: true # SQL에 주석 추가 (필요 시)

