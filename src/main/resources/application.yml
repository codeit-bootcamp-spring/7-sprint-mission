spring:
  application:
    name: discodeit

  # 데이터베이스 연결 설정값
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver

  jpa:
    database: postgresql
    hibernate:
      ddl-auto: update
      default_batch_fetch_size: 100
    properties: # SQL 로그 관련 설정 값
      hibernate:
        show_sql: true
        format_sql: true

discodeit:
  storage:
    type: local
    local:
      root-path: C:/Users/user/Workspace/codeit-sprint-bootcamp/7-sprint-mission/image

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

