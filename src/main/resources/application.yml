spring:
  application:
    name: discodeit
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
  jpa:
    database: postgresql
    show-sql: true # System.out을 통해 SQL 출력. 운영 환경에서는 권장하지 않음
    properties:
      hibernate: # JPA 인터페이스를 구현
        ddl-auto: update # 변경된 스키마 적용. 컬럼 추가만 반영. 삭제x
        format_sql: true # SQL을 보기 좋게 포맷팅 (들여쓰기 등)
        # use_sql_comments: true # SQL에 주석 추가 (필요 시)

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG # SQL 쿼리 로깅 (로거를 통해 출력)
        # Spring Boot 3.0 이상에서는 org.hibernate.orm.jdbc.bind 사용
        type:
          descriptor:
            sql: TRACE # SQL 쿼리에 바인딩되는 파라미터 값 확인
        # Spring Boot 3.0 이상에서는 org.hibernate.orm.jdbc.bind 사용
        orm:
          jdbc:
            bind: TRACE # Spring Boot 3.0+ 파라미터 값 확인


server:
  port: 4444

discodeit:
  repository:
    type: file   # jcf | file
    file-directory: .discodeit

blog:
