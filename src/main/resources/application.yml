server:
  port: 8080

discodeit:
  repository:
    type: file   # jcf | file
    file-directory: .discodeit


spring:
  application:
    name: discodeit

  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: postgres
    password: 6091
    driver-class-name: org.postgresql.Driver

  jpa:
    database: POSTGRESQL
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        show_sql: true
        format_sql: true
    open-in-view: true
#default open-in-view: true but silmu false