jwt:
  secret: ${JWT_SECRET:mySecretKeyForJwtTokenGeneration1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ}
  access-token-expiration: 900000
  refresh-token-expiration: 1209600000
  issuer: discodeit

management:
  observations:
    annotations:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health, info, metrics, loggers # *
      base-path: /management  #actuator->management 로 경로 변경
  endpoint:
    health:
      show-details: always #개발 환경에서는 always, 운영에서는 when-authorized
  info:
    env:
      enabled: true
  server:
    port: 8081 # Actuator 전용 포트 (방화벽으로 막음
info:
  app:
    name: Discodeit
    description: codeit_practice
    version: 1.7.0
    encoding: UTF-8
    java-version: 17
    spring-boot-version: 3.4.0

  properties:
    datasource:
      url: ${spring.datasource.url}
      driver-class-name: ${spring.datasource.driver-class-name}
    jpa:
      ddl-auto: ${spring.jpa.hibernate.ddl-auto}
    multipart:
      max-file-size: ${spring.servlet.multipart.max-file-size}
      max-request-size: ${spring.servlet.multipart.max-request-size}