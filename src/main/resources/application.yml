spring:
  application:
    name: discodeit
  servlet:
    multipart:
      maxFileSize: 10MB # 파일 하나의 최대 크기
      maxRequestSize: 30MB  # 한 번에 최대 업로드 가능 용량
  mail:
    host: smtp.gmail.com   # 사용하려는 메일 서버
    port: 587
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  config:
    import: "classpath:application-secret.yml"

discodeit:
  repository:
    type: file   # jcf | file
    file-directory: .discodeit

springdoc:
  swagger-ui:
    path: /api-docs-ui.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true
    doc-expansion: list

  api-docs:
    path: /my-api