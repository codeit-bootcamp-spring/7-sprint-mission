spring:
  application:
    name: discodeit
#  datasource:
#    url: jdbc:postgresql://localhost:5432/discodeit
#    driver-class-name: org.postgresql.Driver
#    username: discodeit_user
#    password: discodeit1234
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:~/test;AUTO_SERVER=TRUE #Spring 실행 중에도 같이 쓰고 싶다
    #url: jdbc:h2:~/test  #jdbc:h2:tcp://localhost/~/test
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB


logging:
  level:
    root: info
    # 우리가 작성한 패키지
    com.sprint.mission: debug
    # SQL 로그 (유지)
    org.hibernate.SQL: debug




storage:
  type: local
  path: ./storage/dev

server:
  port: 4444

