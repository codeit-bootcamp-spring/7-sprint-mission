spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop # 테스트마다 테이블 생성/삭제
    show-sql: true # SQL 로그 출력
    properties:
      hibernate:
        format_sql: true # SQL 포맷팅

  h2:
    console:
      enabled: true