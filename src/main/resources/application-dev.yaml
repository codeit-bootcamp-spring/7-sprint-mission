server:
  port: 9090

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver

logging:
  level:
    org.springframework.security: debug
    com.sprint.mission.discodeit: debug
    com.p6spy: debug

management:
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
  observations:
    annotations:
      enabled: true

discodeit:
  jwt:
    secret: mySecretKeyForJwtTokenGeneration1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ
    access-token-expiration: 900000
    refresh-token-expiration: 1209600000
    issuer: codeit
