server:
  port: 9090

spring:
  datasource:
    url: jdbc:h2:mem:discodeit;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true # 콘솔 실행
      path: /h2-console #default 접속주소 localhost:8080/h2-console

  jpa:
    database: h2
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true

logging:
  level:
    org:
      hibernate:
        orm:
          jdbc:
            bind: TRACE



# application.yaml
discodeit:
  storage:
    type: local
    local:
      root-path: Desktop/codeit-7th-develop/DiscodeitUpload_dev