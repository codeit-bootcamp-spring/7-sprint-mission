spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver
  jpa:
    database: postgresql
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: false
        format_sql: true

  config:
    activate:
      on-profile: prod

server:
  port: 8081

logging:
  level:
    root: info
    com.sprint.mission.discodeit: INFO
    org.hibernate.sql: DEBUG # 너무 복잡하면 INFO or WARN
    org.hibernate.orm.jdbc.bind: TRACE