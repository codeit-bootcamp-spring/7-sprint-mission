spring:
  datasource:
    url: jdbc:postgresql://db-server:5432/discodeit
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    database: postgresql
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: false # SQL 확인
        format_sql: false # 읽기 쉽게

logging:
  level:
    org.hibernate.SQL: info
    org.springframework.web: info

server:
  port: 8080