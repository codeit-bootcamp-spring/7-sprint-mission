spring:
  application:
    name: discodeit

#  datasource:
#    url: jdbc:postgresql://localhost:5432/discodeit
#    username: discodeit_user
#    password: discodeit1234
  datasource:
    url: jdbc:postgresql://prod-db:5432/discodeit
    driver-class-name: org.postgresql.Driver
    username: discodeit_user
    password: discodeit1234


  jpa:
    hibernate:
      ddl-auto: validate #스키마 자동 변경 금지
    show-sql: false
    database: postgresql

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB


logging:
  level:
    root: info
    # 우리가 작성한 패키지
    com.sprint.mission: info
    # SQL 로그 (유지)
    org.hibernate.SQL: debug


storage:
  type: s3
  path: s3://discodeit-bucket

server:
  port: 4440 #포트 분리

