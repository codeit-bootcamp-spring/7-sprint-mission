spring:
  application:
    name: discodeit

#  datasource:
#    url: jdbc:postgresql://localhost:5432/discodeit
#    username: discodeit_user
#    password: discodeit1234
  datasource:
    url: jdbc:postgresql://prod-db:5432/discodeit
    driver-class-name: org.postgresql.Driver
    username: discodeit_user
    password: discodeit1234


  jpa:
    hibernate:
      ddl-auto: validate #스키마 자동 변경 금지
    show-sql: false
    database: postgresql

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB


logging:
  level:
    root: info
    # 우리가 작성한 패키지
    com.sprint.mission: info
    # SQL 로그 (유지)
    org.hibernate.SQL: debug
    org.springframework.retry: DEBUG


# ===============================
# Actuator 설정
# ===============================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics #,loggers(보안위험) => /actuator/loggers로 로그 레벨을 런타임에 변경 가능
  endpoint:
    health:
      show-details: never
  observations:     # 비동기 Event Listener에 @Observed(name = "metric 이름을 써준다!") 적용
    annotations:
      enabled: true

storage:
  type: s3
  path: s3://discodeit-bucket

server:
  port: 4440 #포트 분리

