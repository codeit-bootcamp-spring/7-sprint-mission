server:
  port: 80

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

logging:
  level:
    root: info
    com.sprint.mission.discodeit: info

management:
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: false