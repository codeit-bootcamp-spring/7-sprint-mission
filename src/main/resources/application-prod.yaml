server:
  port: 80

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

logging:
  level:
    com.sprint.mission.discodeit: info
    p6spy: off

management:
  endpoint:
    health:
      show-details: never
    web:
      exposure:
        include: health
  info:
    env:
      enabled: false