server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver

  jpa:
    database: postgresql
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: true
        format_sql: true

logging:
  level:
    com:
      sprint:
        mission:
          discodeit: INFO
    org:
      hibernate:
        orm:
          jdbc:
            bind: INFO

discodeit:
  storage:
    type: local
    local:
      root-path: "${user.home}/Desktop/codeit-7th-develop/DiscodeitUpload"