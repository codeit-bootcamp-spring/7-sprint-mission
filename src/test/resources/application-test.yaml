spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 9090

logging:
  level:
    com.sprint.mission.discodeit: debug
    org.hibernate.SQL: debug
    org. hibernate.orm.jdbc.bind: trace