server:
  port: 7070

spring:
  datasource:
    url: jdbc:h2:mem:discodeit;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database: h2
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        show_sql: true
        format_sql: true

logging:
  level:
    org:
      hibernate:
        sql: DEBUG
        type:
          descriptor:
            sql: trace

discodeit:
  storage:
    type: local
    local:
      root-path: ./build/tmp/test-storage

app:
  admin:
    username: admin
    email: a@a.a
    password: 1234