# docker-compose-kafka.yml
# https://developer.confluent.io/confluent-tutorials/kafka-on-docker/#the-docker-compose-file

# docker compose -f docker-compose-kafka.yml up -d
# docker exec -it -w /opt/kafka/bin broker sh

# 현재 이벤트 확인
# ./kafka-topics.sh --list --bootstrap-server broker:29092

# 특정 토픽 이벤트 구독 및 대기 (실행위치: /opt/kafka/bin)
# ./kafka-console-consumer.sh --topic discodeit.MessageCreatedEvent --from-beginning --bootstrap-server broker:29092

# 모든 토픽 이벤트
# ./kafka-console-consumer.sh --include "discodeit\..*" --from-beginning --bootstrap-server broker:29092

# 특정 다수 토픽 이벤트 ('|' 로 구분)
# ./kafka-console-consumer.sh --include "discodeit.MessageCreatedEvent|discodeit.RoleUpdatedEvent" --from-beginning --bootstrap-server broker:29092

# 어느 토픽에서 온 알림인제 확인 (명령어 뒤에 붙이기)
# --property print.topic=true

services:
  broker:
    image: apache/kafka:latest
    hostname: broker
    container_name: broker
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENERS: PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk