events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 기본 타임아웃 설정 (연결 유지력 강화)
    keepalive_timeout 65;

    # upstream 설정 (로드 밸런싱 전략)
    upstream backend {
        # least_conn; # 현재 연결이 가장 적은 서버로 전달
        ip_hash;    # 클라이언트 IP 기준으로 서버 고정 -> 같은 사용자는 항상 같은 서버로

        # 가중치가 높은 컨테이너로 트래픽을 더 많이 전송
        #server 7-sprint-mission-backend-1:8080 weight=3;
        #server 7-sprint-mission-backend-2:8080 weight=1;
        #server 7-sprint-mission-backend-3:8080 weight=1;

        server backend:8080; # 이렇게 사용시 Docker가 자동으로 분산
    }

    server {
        listen 80;
        server_name localhost;

        # 1. 정적 리소스 (프론트엔드)
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 2. API 및 SSE 요청 → Backend
        # SSE는 보통 /api 경로를 통해 들어오므로 여기에 관련 설정을 추가합니다.
        location /api {
            proxy_pass http://backend;

            # SSE 필수 설정: 버퍼링을 끄지 않으면 메시지가 실시간으로 전달되지 않고 고입니다.
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection ""; # SSE Keep-alive를 위해 비워둠
            chunked_transfer_encoding on;

            # 공통 헤더
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 연결 유지 시간 (SSE 연결이 1분마다 끊기는 것을 방지)
            proxy_read_timeout 3600s;

            add_header X-Upstream-Server $upstream_addr always;
        }

        # 3. WebSocket 요청
        location /ws {
            proxy_pass http://backend;

            # WebSocket 업그레이드 필수 설정
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 헤더 전달
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header X-Upstream-Server $upstream_addr always;
        }
    }
}