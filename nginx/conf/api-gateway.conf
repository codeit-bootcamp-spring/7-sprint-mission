# 1. Rate Limiting 설정
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_status 429;

# 2. 백엔드 서비스 정의
upstream backend_app {
    server app:80;
}

server {
    listen 80;
    server_name localhost;

    # [필수] MIME Type 설정 - JS/CSS 정상 로드 보장
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 기본 루트 경로
    root /usr/share/nginx/html;

    # 브라우저가 '/nginx/html/assets/'를 찾으면 '/usr/share/nginx/html/assets/'로 연결
    location /nginx/html/assets/ {
        alias /usr/share/nginx/html/assets/;
        try_files $uri =404;
    }

    location /nginx/html/assetshtml/assets/ {
        alias /usr/share/nginx/html/assets/;
        try_files $uri =404;
    }

    # 기본 정적 파일 서빙 (index.html 등)
    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 정석 assets 경로 (혹시 정상 경로로 요청 올 경우 대비)
    location /assets/ {
        try_files $uri =404;
    }

    # API Gateway 헬스체크
    location /health {
        add_header Content-Type application/json;
        return 200 '{"status":"UP","message":"API Gateway is healthy"}';
    }

    # 모든 API 요청 라우팅
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        proxy_pass http://backend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header X-Gateway-Status "Handled-by-Gateway" always;
    }

    # WebSocket 라우팅
    location /ws/ {
        proxy_pass http://backend_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}