# Nginx 로드 밸런서 & 리버스 프록시 설정

# 1. 로드 밸런서를 위한 업스트림 서버 그룹 정의
# 여기서 업스트림 서버란, Spring Boot 애플리케이션 인스턴스들을 의미한다.
upstream spring_backend {

	# 1-1. 로드 밸런싱 알고리즘: Round Robin (별도로 설정하지 않으면 기본값)
    # least_conn;        # 최소 연결 수 기반
    # ip_hash;           # 클라이언트 IP 해시 기반
    # random;            # 랜덤 선택

    # 1-2. Spring Boot 인스턴스들
;     server app:8080 max_fails=3 fail_timeout=30s;


    # 1-3. 가중치 기반 로드 밸런싱 예시 (주석 처리)
     least_conn
     server app-instance-1:8080 weight=3 max_fails=3 fail_timeout=30s;
     server app-instance-2:8080 weight=2 max_fails=3 fail_timeout=30s;
     server app-instance-3:8080 weight=1 max_fails=3 fail_timeout=30s;

    # 1-4. Keep-alive 연결 설정: 32개의 연결을 유지하며 재사용한다. (성능 최적화)
    keepalive 32;
}

# 2. 프록시 캐시 설정
# 프록시 캐시는 Nginx가 업스트림 서버(Spring Boot)로부터 받은 응답을 캐시하여 빠르게 제공하는 기능이다.
# 동일한 요청이 들어올 때 업스트림 서버에 다시 요청하지 않고 캐시된 응답을 Nginx가 클라이언트에게 직접 전달한다.
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m
                 max_size=100m inactive=5m use_temp_path=off;

# 3. 로그 포맷 정의 (상세 모니터링용)
log_format load_balancer_detailed '$remote_addr - $remote_user [$time_local] '
                                  '"$request" $status $body_bytes_sent '
                                  '"$http_referer" "$http_user_agent" '
                                  'upstream_addr="$upstream_addr" '
                                  'upstream_status="$upstream_status" '
                                  'upstream_response_time="$upstream_response_time" '
                                  'request_time="$request_time" '
                                  'cache_status="$upstream_cache_status"';

# 4. 해당 프로젝트에서는 HTTPS 사용이 아닌 HTTP 사용이므로, 80번 포트로 외부에서 접근 가능하도록 설정한다.
server {
    # 4-1. 80번 포트로 외부에서 접근 가능하도록 설정
	listen 80;
    # 4-2. localhost 도메인으로 접근 가능하도록 설정
    server_name localhost;

    # 4-3. 로깅 설정
    access_log /dev/stdout load_balancer_detailed;
    # 4-4. 에러 로그 레벨 설정 (SSL 디버깅용)
    error_log /dev/stderr info;

    # 4-5. 성능 최적화 설정
    # 커널 공간에서 직접 파일을 전송하여 메모리 복사 과정을 생략함으로써 I/O 성능을 향상시킨다
	sendfile on;
	# 작은 패킷들을 모아서 한 번에 전송하여 네트워크 효율성을 높인다 (sendfile과 함께 사용 시 효과적)
    tcp_nopush on;
	# TCP 소켓에서 Nagle 알고리즘을 비활성화하여 작은 패킷도 즉시 전송하여 응답 지연을 최소화한다
    tcp_nodelay on;
	# 클라이언트와의 연결을 65초 동안 유지하여 연결 재사용을 통한 오버헤드를 줄인다
    keepalive_timeout 65;
	# MIME 타입을 저장하는 해시 테이블의 최대 크기를 설정하여 파일 타입 처리 성능을 최적화한다
    types_hash_max_size 2048;

    # 4-6. 기본 프록시 설정
    # HTTP/1.1 프로토콜 사용
    proxy_http_version 1.1;
    # WebSocket 업그레이드 헤더 설정
    proxy_set_header Upgrade $http_upgrade;
    # 연결 유지
    proxy_set_header Connection "";
    # 호스트 헤더 설정
    proxy_set_header Host $host;
    # 실제 클라이언트 IP 헤더 설정
    proxy_set_header X-Real-IP $remote_addr;
    # 프록시 추가 IP 헤더 설정
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # 프로토콜 헤더 설정
    proxy_set_header X-Forwarded-Proto $scheme;

    # 4-7. 타임아웃 설정
    proxy_connect_timeout 30s;	# 연결 타임아웃
    proxy_send_timeout 30s;		# 전송 타임아웃
    proxy_read_timeout 30s;		# 읽기 타임아웃

    # 4-8. 정적 파일 서빙 (/, /index.html, CSS, JS)
    location / {
        proxy_pass http://spring_backend;

                 # 캐시 설정
                 proxy_cache api_cache;
                 proxy_cache_valid 200 301 302 5m;  # 5분간 캐시
                 proxy_cache_valid 404 1m;          # 404는 1분간 캐시
                 proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
                 proxy_cache_lock on;
                 proxy_cache_lock_timeout 5s;

                 # 캐시 상태 헤더
                 add_header X-Cache-Status $upstream_cache_status always;
                 add_header X-Upstream-Server $upstream_addr;

                 # 캐시 바이패스 조건 (POST, PUT, DELETE 요청)
                 proxy_cache_methods GET HEAD;

        # 에러 처리
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30s;
    }

    location /sse {
        proxy_pass http://spring_backend;

        proxy_buffering off;
        proxy_cache off;

        proxy_http_version 1.1;
        proxy_set_header Connection '';

        add_header X-Upstream-Server $upstream_addr;
        proxy_read_timeout 1h;
    }

